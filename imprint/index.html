<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imprint · Askus</title>
  <meta name="description" content="Imprint and company details for Askus GmbH, Vaduz, Liechtenstein.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root{--bg:#fafafa;--fg:#0a0a0a;--muted:#666}
    [data-theme="dark"]{--bg:#1c1b19;--fg:#e8e4de;--muted:#9a958d}
    body{font-family:Helvetica,Arial,sans-serif;margin:0;padding:3rem;line-height:1.6;background:var(--bg);color:var(--fg);transition:background 0.3s,color 0.3s}
    a{color:var(--fg)}
    .k{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;letter-spacing:.08em;text-transform:uppercase;font-size:.75rem;color:var(--muted)}
    h1{font-weight:500;margin:.5rem 0 2rem 0}
    .card{max-width:720px}
    .theme-toggle{position:fixed;bottom:2rem;right:2rem;z-index:100;width:2.5rem;height:2.5rem;border-radius:50%;background:var(--fg);color:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.2s,opacity 0.2s;opacity:0.7}
    .theme-toggle:hover{opacity:1;transform:scale(1.1)}
    .theme-toggle svg{width:1.1rem;height:1.1rem}
    @media(max-width:768px){body{padding:1.25rem}.theme-toggle{bottom:1rem;right:1rem;width:2.2rem;height:2.2rem}}
  </style>
</head>
<body>
  <div class="card">
    <div class="k">Imprint</div>
    <h1>Askus GmbH</h1>
    <p><strong>Address</strong><br>Pflugstrasse 20<br>9490 Vaduz<br>Liechtenstein</p>
    <p><strong>Contact</strong><br><a href="mailto:contact@askus.li">contact@askus.li</a></p>
    <p><strong>Commercial register</strong><br>Registered in Liechtenstein</p>
    <p><a href="/">Back</a></p>
  </div>

  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
    <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const sunIcon = themeToggle.querySelector('.theme-icon-sun');
    const moonIcon = themeToggle.querySelector('.theme-icon-moon');

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('askus-theme', theme);
      sunIcon.style.display = theme === 'dark' ? 'none' : 'block';
      moonIcon.style.display = theme === 'dark' ? 'block' : 'none';
    }

    const savedTheme = localStorage.getItem('askus-theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    setTheme(savedTheme);

    themeToggle.addEventListener('click', () => {
      setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
  </script>
</body>
</html>
